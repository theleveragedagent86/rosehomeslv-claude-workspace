<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="../../assets/brand-tokens.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
      [data-composition-id="01-intro-lower-third"] {
        position: relative; width: 1920px; height: 1080px; overflow: hidden;
        font-family: var(--font-display); color: var(--ink);
      }
      [data-composition-id="01-intro-lower-third"] .lt-bar {
        position: absolute;
        bottom: 120px; left: 80px;
        display: flex; align-items: center;
        background: var(--bg);
        border-left: 8px solid var(--warn);
        padding: 26px 36px 26px 28px;
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(15,76,92,0.35);
        opacity: 0;
        transform: translateX(-60px);
        max-width: 880px;
      }
      [data-composition-id="01-intro-lower-third"] .lt-mark {
        width: 72px; height: 72px;
        border-radius: 50%;
        overflow: hidden;
        background: var(--bg-alt);
        margin-right: 24px;
        flex-shrink: 0;
        box-shadow: 0 0 0 3px var(--warn), 0 0 0 5px var(--bg);
      }
      [data-composition-id="01-intro-lower-third"] .lt-mark img {
        width: 100%; height: 100%; object-fit: cover; object-position: center 30%;
      }
      [data-composition-id="01-intro-lower-third"] .lt-text { display: flex; flex-direction: column; gap: 4px; }
      [data-composition-id="01-intro-lower-third"] .lt-name {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 56px;
        line-height: 1;
        letter-spacing: -0.01em;
        color: var(--ink);
      }
      [data-composition-id="01-intro-lower-third"] .lt-role {
        font-family: var(--font-mono);
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.22em;
        color: var(--warn);
        text-transform: uppercase;
      }
      [data-composition-id="01-intro-lower-third"] .scrim {
        position: absolute; bottom: 0; left: 0; right: 0; height: 320px;
        background: linear-gradient(0deg, rgba(15,76,92,0.55) 0%, rgba(15,76,92,0) 100%);
        opacity: 0;
      }
      [data-composition-id="01-intro-lower-third"] .topic-card {
        position: absolute;
        top: 90px; right: 80px;
        background: var(--bg-alt);
        border: 3px solid var(--ink);
        border-top: 10px solid var(--warn);
        border-radius: 14px;
        padding: 22px 30px 24px 30px;
        box-shadow: 0 18px 48px rgba(15,76,92,0.35);
        opacity: 0;
        transform: translateY(-30px) scale(0.94);
        will-change: transform, opacity;
        max-width: 620px;
      }
      [data-composition-id="01-intro-lower-third"] .topic-card .kicker {
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.32em;
        color: var(--warn);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      [data-composition-id="01-intro-lower-third"] .topic-card .head {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 38px;
        line-height: 1.05;
        letter-spacing: -0.01em;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <div
      id="sec01"
      data-composition-id="01-intro-lower-third"
      data-duration="40"
      data-width="1920"
      data-height="1080"
    >
      <div class="scrim clip" data-start="0" data-duration="40" data-track-index="0"></div>

      <div class="topic-card clip" data-start="0" data-duration="40" data-track-index="2">
        <div class="kicker">TODAY&apos;S LESSON</div>
        <div class="head">5 Social Posts From 1 Listing</div>
      </div>

      <div class="lt-bar clip" data-start="0" data-duration="40" data-track-index="1">
        <div class="lt-mark">
          <img src="../../assets/leveraged-agent-logo-small.png" alt="" />
        </div>
        <div class="lt-text">
          <div class="lt-name">RYAN ROSE</div>
          <div class="lt-role">The Leveraged Agent</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const SLOT = 40;
      const tl = gsap.timeline({ paused: true });

      // Lower-third (left) — slides in from the left with a back.out nudge.
      tl.to('[data-composition-id="01-intro-lower-third"] .scrim',
        { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.50);
      tl.to('[data-composition-id="01-intro-lower-third"] .lt-bar',
        { opacity: 1, x: 0, duration: 0.55, ease: 'back.out(1.4)' }, 1.65);

      // Topic card (right) — drops in 0.6s after the lower-third lands, settling with bounce.
      tl.to('[data-composition-id="01-intro-lower-third"] .topic-card',
        { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'back.out(1.5)' }, 2.30);

      // Both exit together around 10s — chyron is a single name-tag event.
      tl.to('[data-composition-id="01-intro-lower-third"] .lt-bar',
        { opacity: 0, x: -60, duration: 0.45, ease: 'power2.in' }, 10.50);
      tl.to('[data-composition-id="01-intro-lower-third"] .topic-card',
        { opacity: 0, y: -30, duration: 0.45, ease: 'power2.in' }, 10.55);
      tl.to('[data-composition-id="01-intro-lower-third"] .scrim',
        { opacity: 0, duration: 0.6, ease: 'power2.in' }, 10.40);

      tl.to({}, { duration: SLOT }, 0);
      window.__timelines["01-intro-lower-third"] = tl;
    </script>
  </body>
</html>
