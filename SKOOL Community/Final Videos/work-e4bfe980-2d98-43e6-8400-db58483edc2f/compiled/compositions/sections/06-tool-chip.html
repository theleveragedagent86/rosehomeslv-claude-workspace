<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="../../assets/brand-tokens.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
      [data-composition-id="06-tool-chip"] {
        position: relative; width: 1920px; height: 1080px; overflow: hidden;
        font-family: var(--font-display);
      }
      /* Tool name-tag — small floating chip top-left. Triggers when Ryan
         references a specific tool ("Claude Opus", "the max plan", etc). */
      [data-composition-id="06-tool-chip"] .tool {
        position: absolute;
        top: 90px; left: 80px;
        display: inline-flex; align-items: center; gap: 14px;
        background: var(--ink); color: var(--bg-alt);
        border-radius: 999px;
        padding: 14px 26px 14px 18px;
        box-shadow: 0 14px 32px rgba(15,76,92,0.5);
        opacity: 0;
        transform: translateY(-30px) scale(0.92);
        will-change: transform, opacity;
      }
      [data-composition-id="06-tool-chip"] .tool .pulse-dot {
        width: 14px; height: 14px; border-radius: 50%; background: var(--warn);
        box-shadow: 0 0 0 0 rgba(232,163,61,0.8);
        animation: tool-pulse 1.6s infinite ease-out;
      }
      @keyframes tool-pulse {
        0%   { box-shadow: 0 0 0 0 rgba(232,163,61,0.6); }
        70%  { box-shadow: 0 0 0 14px rgba(232,163,61,0); }
        100% { box-shadow: 0 0 0 0 rgba(232,163,61,0); }
      }
      [data-composition-id="06-tool-chip"] .tool .tag {
        font-family: var(--font-mono);
        font-weight: 700; font-size: 22px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      [data-composition-id="06-tool-chip"] .tool .name {
        font-family: var(--font-display);
        font-weight: 900; font-size: 26px;
        letter-spacing: -0.01em;
        color: var(--warn);
      }
    </style>
  </head>
  <body>
    <div
      id="sec06"
      data-composition-id="06-tool-chip"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div class="tool clip" data-start="0" data-duration="5" data-track-index="0">
        <div class="pulse-dot"></div>
        <div class="tag">Tool —</div>
        <div class="name">Claude</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const SLOT = 5;
      const tl = gsap.timeline({ paused: true });

      tl.to('[data-composition-id="06-tool-chip"] .tool',
        { opacity: 1, y: 0, scale: 1, duration: 0.45, ease: 'back.out(1.6)' }, 0.10);
      tl.to('[data-composition-id="06-tool-chip"] .tool',
        { opacity: 0, y: -30, duration: 0.4, ease: 'power2.in' }, 4.40);

      tl.to({}, { duration: SLOT }, 0);
      window.__timelines["06-tool-chip"] = tl;
    </script>
  </body>
</html>
